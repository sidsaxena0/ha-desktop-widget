name: Release

# Build signed/notarized macOS (universal) + Windows installers on a version tag.
on:
  push:
    tags: ["v*"]
  workflow_dispatch:

jobs:
  build:
    # Insurance: only ever build for a version tag, never a branch.
    if: ${{ startsWith(github.ref, 'refs/tags/v') }}
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos-latest
            args: "--target universal-apple-darwin"
            rust-targets: "aarch64-apple-darwin,x86_64-apple-darwin"
          - platform: windows-latest
            args: ""
            rust-targets: ""
    runs-on: ${{ matrix.platform }}
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.rust-targets }}

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: "./src-tauri -> target"

      - run: pnpm install --frozen-lockfile

      # Builds are UNSIGNED (Tauri ad-hoc signs the macOS app). To enable a
      # notarized macOS build later: add a Developer ID cert + the APPLE_*
      # values as repo secrets, expose them at the JOB level via `env:` (the
      # `secrets` context can't be used in a step `if:`), and pass them to this
      # step. See CONTRIBUTING for the full secret list.
      - uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: "HA Widget ${{ github.ref_name }}"
          releaseDraft: true
          prerelease: false
          args: ${{ matrix.args }}
          releaseBody: |
            Always-on-top desktop widget for controlling Home Assistant.

            ### Download
            - **macOS** — `.dmg` (universal: Apple Silicon + Intel)
            - **Windows** — `.msi` or `-setup.exe` installer

            ### First launch (these builds are unsigned)
            - **macOS:** right-click the app → **Open** → **Open**, or run
              `xattr -dr com.apple.quarantine "/Applications/HA Widget.app"`.
            - **Windows:** if SmartScreen appears, click **More info → Run anyway**.

            See the [README](https://github.com/sidsaxena0/ha-desktop-widget#readme) for setup.
