name: Release

# Build signed/notarized macOS (universal) + Windows installers on a version tag.
on:
  push:
    tags: ["v*"]
  workflow_dispatch:

jobs:
  build:
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos-latest
            args: "--target universal-apple-darwin"
            rust-targets: "aarch64-apple-darwin,x86_64-apple-darwin"
          - platform: windows-latest
            args: ""
            rust-targets: ""
    runs-on: ${{ matrix.platform }}
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.rust-targets }}

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: "./src-tauri -> target"

      - run: pnpm install --frozen-lockfile

      # macOS code-signing + notarization runs ONLY when the Developer ID
      # secrets exist; otherwise the build stays unsigned (Tauri ad-hoc signs
      # it). This keeps the workflow green with or without secrets configured.
      - name: Configure Apple signing
        if: ${{ matrix.platform == 'macos-latest' && secrets.APPLE_CERTIFICATE != '' }}
        run: |
          {
            echo "APPLE_CERTIFICATE=${{ secrets.APPLE_CERTIFICATE }}"
            echo "APPLE_CERTIFICATE_PASSWORD=${{ secrets.APPLE_CERTIFICATE_PASSWORD }}"
            echo "APPLE_SIGNING_IDENTITY=${{ secrets.APPLE_SIGNING_IDENTITY }}"
            echo "APPLE_ID=${{ secrets.APPLE_ID }}"
            echo "APPLE_PASSWORD=${{ secrets.APPLE_PASSWORD }}"
            echo "APPLE_TEAM_ID=${{ secrets.APPLE_TEAM_ID }}"
          } >> "$GITHUB_ENV"

      - uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: "HA Widget ${{ github.ref_name }}"
          releaseDraft: true
          prerelease: false
          args: ${{ matrix.args }}
          releaseBody: |
            Always-on-top desktop widget for controlling Home Assistant.

            ### Download
            - **macOS** — `.dmg` (universal: Apple Silicon + Intel)
            - **Windows** — `.msi` or `-setup.exe` installer

            ### First launch (these builds are unsigned)
            - **macOS:** right-click the app → **Open** → **Open**, or run
              `xattr -dr com.apple.quarantine "/Applications/HA Widget.app"`.
            - **Windows:** if SmartScreen appears, click **More info → Run anyway**.

            See the [README](https://github.com/sidsaxena0/ha-desktop-widget#readme) for setup.
