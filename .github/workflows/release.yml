name: Release

# Build signed/notarized macOS (universal) + Windows installers on a version tag.
on:
  push:
    tags: ["v*"]
  workflow_dispatch:

jobs:
  build:
    # Insurance: only ever build for a version tag, never a branch.
    if: ${{ startsWith(github.ref, 'refs/tags/v') }}
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos-latest
            args: "--target universal-apple-darwin"
            rust-targets: "aarch64-apple-darwin,x86_64-apple-darwin"
          - platform: windows-latest
            args: ""
            rust-targets: ""
    runs-on: ${{ matrix.platform }}
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.rust-targets }}

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: "./src-tauri -> target"

      - run: pnpm install --frozen-lockfile

      # Build only (UNSIGNED — Tauri ad-hoc signs the macOS app). We deliberately
      # do NOT create the GitHub Release here: the default Actions token can't
      # reliably create releases on this repo, and we won't store a broad PAT in
      # CI. Instead the installers are uploaded as artifacts and the Release is
      # published with `gh` (see scripts/publish-release.sh).
      - uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          args: ${{ matrix.args }}

      - name: Upload installers
        uses: actions/upload-artifact@v4
        with:
          name: installers-${{ matrix.platform }}
          if-no-files-found: ignore
          retention-days: 14
          path: |
            src-tauri/target/**/release/bundle/dmg/*.dmg
            src-tauri/target/**/release/bundle/msi/*.msi
            src-tauri/target/**/release/bundle/nsis/*-setup.exe
